<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喀斯特地区工程建设难题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 背景样式与test.html保持一致 */
        body {
            position: relative;
            color: #333;
            line-height: 1.6;
            padding: 20px 0;
            min-height: 100vh;
            background-image: url("picture/4.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: scroll;
        }

        /* 关键修改：缩短主内容区上边距（从80px改为30px） */
        .main-content {
            max-width: 80%;
            margin: 0 auto;
            padding: 0 16px;
            margin-top: 30px; /* 核心调整：减小上边距，缩短文字区域与顶部的距离 */
        }

        /* 视频标题 */
        .video-title-box {
            text-align: center;
            margin-bottom: 25px;
            padding: 0 16px;
        }
        .video-title {
            font-size: 36px;
            font-weight: 700;
            color: #0050b3;
            text-shadow: 0 3px 6px rgba(0,0,0,0.12);
            letter-spacing: 1.2px;
            line-height: 1.3;
        }

        /* 视频播放区 */
        .video-player {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }
        .video-player video {
            width: 100%;
            height: auto;
            border-radius: 8px;
            aspect-ratio: 16/9;
            object-fit: contain;
        }

        /* 讲解区域 - 美化文字排版 */
        .video-explain {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }
        .explain-title {
            font-size: 24px;
            font-weight: 600;
            color: #1677ff;
            margin-bottom: 20px;
            border-left: 4px solid #1677ff;
            padding-left: 15px;
            letter-spacing: 0.8px;
        }
        .explain-content {
            font-size: 18px;
            line-height: 2.2;
            color: #2c3e50;
            letter-spacing: 0.5px;
            text-align: justify;
        }
        .explain-content p {
            margin-bottom: 20px;
            text-indent: 2em;
        }
        .explain-content .highlight {
            color: #1677ff;
            font-weight: 500;
            font-style: italic;
        }
        .explain-content .section-title {
            font-weight: 600;
            color: #0050b3;
            margin: 15px 0 10px 0;
            display: block;
        }
        .explain-content .sub-content {
            margin-left: 1em;
        }
        .explain-content .other-title {
            font-weight: 600;
            color: #0050b3;
            margin: 20px 0 10px 0;
            display: block;
        }
        .explain-content .solve-title {
            font-weight: 600;
            color: #0050b3;
            margin: 20px 0 10px 0;
            display: block;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 100px;
            height: 48px;
            border-radius: 24px;
            background: linear-gradient(135deg, #1677ff 0%, #4096ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 16px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(22, 119, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 999;
            user-select: none;
        }
        .back-btn .icon {
            font-size: 18px;
            font-weight: bold;
        }
        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(22, 119, 255, 0.4);
            background: linear-gradient(135deg, #0958d9 0%, #3388ff 100%);
        }
        .back-btn:active {
            transform: scale(1.02);
            box-shadow: 0 3px 10px rgba(22, 119, 255, 0.3);
        }

        /* 错误提示 */
        .error-tip {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            padding: 10px 20px;
            background: #ff4d4f;
            border-radius: 8px;
            display: none;
            z-index: 999;
            box-shadow: 0 2px 8px rgba(255, 77, 79, 0.3);
        }
    </style>
</head>
<body>
    <!-- 左上角返回按钮 -->
    <div class="back-btn" onclick="window.location.href='test.html'">
        <span class="icon">←</span>
        <span>返回</span>
    </div>

    <div class="main-content">
        <div class="video-title-box">
            <h1 class="video-title">喀斯特地区工程建设难题</h1>
        </div>

        <div class="video-player">
            <video controls preload="metadata" poster="picture/v3.jpg">
                <source src="video/video3.mp4" type="video/mp4">
                您的浏览器不支持HTML5视频播放，请升级浏览器！
            </video>
        </div>

        <div class="video-explain">
            <h2 class="explain-title">喀斯特地区工程建设难题解析</h2>
            <div class="explain-content">
                <p>在喀斯特地貌地区的工程主要面临以下四大难题：</p>
                
                <span class="section-title">一、地基不稳</span>
                <p class="sub-content">喀斯特地貌地区地下藏有大大小小的空洞，就像地基被掏空，极易导致地面塌陷或建筑物倾斜。</p>

                <span class="section-title">二、地下迷宫，施工风险高</span>
                <p class="sub-content">地下暗河和溶洞发育隧道开挖时极易遭遇高压涌水。</p>

                <span class="section-title">三、资源黑洞，成本难控</span>
                <p class="sub-content">地下情况复杂，常规勘察手段难以摸清全貌，增加返工风险，提高建设成本。</p>

                <span class="section-title">四、水土流失，生态脆弱</span>
                <p class="sub-content">工程可能穿越生态敏感区，增加施工成本。破坏生态环境，加剧水土流失和石漠化。</p>
            </div>
        </div>
    </div>

    <div class="error-tip" id="playError">视频加载失败，请检查文件路径或格式！</div>

    <script>
        const video = document.querySelector('video');
        const playError = document.getElementById('playError');
        
        video.addEventListener('error', function() {
            playError.style.display = 'block';
            setTimeout(() => {
                playError.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
